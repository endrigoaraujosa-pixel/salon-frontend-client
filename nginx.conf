server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # HTML — NUNCA cachear (deve sempre buscar a versão mais recente)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri /index.html;
    }

    # Manifest, version.json e Service Worker — revalidar sempre
    location ~* (manifest\.json|version\.json|sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Assets versionados com hash (JS, CSS, imagens, fontes)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Favicon e outros assets estáticos na raiz
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800" always;
    }

    # SPA fallback — todas as rotas retornam index.html (sem cache)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}